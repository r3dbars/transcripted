name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build
        run: xcodebuild -project Transcripted.xcodeproj -scheme Transcripted -configuration Debug build CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: xcodebuild -project Transcripted.xcodeproj -scheme Transcripted test CODE_SIGNING_ALLOWED=NO
